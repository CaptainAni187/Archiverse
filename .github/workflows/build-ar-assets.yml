name: Build AR assets

# Regenerates the AR (.glb / .usdz) files for artworks and commits them back
# to the repo, so a Vercel deploy picks up the change. Artworks live in
# Supabase (not git), so this can't trigger off a code push automatically —
# run it manually after adding/editing artwork photos or sizes, or let the
# nightly schedule catch up.
on:
  workflow_dispatch:
    inputs:
      artwork_id:
        description: "Only rebuild one artwork (its numeric id). Leave blank for all."
        required: false
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily — safety net for anything missed manually

jobs:
  build-ar-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build AR assets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/build-ar-assets.mjs ${{ github.event.inputs.artwork_id }}

      - name: Commit changed assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ar
          if git diff --cached --quiet; then
            echo "No AR asset changes."
          else
            git commit -m "chore: regenerate AR assets [skip ci]"
            git push
          fi
